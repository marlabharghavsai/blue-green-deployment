- hosts: loadbalancer
  gather_facts: no
  tasks:
    - name: Detect active color
      shell: grep proxy_pass /etc/nginx/sites-enabled/default | grep blue
      register: result
      ignore_errors: yes

    - name: Set colors
      set_fact:
        active_color: "{{ 'blue' if result.rc == 0 else 'green' }}"
        inactive_color: "{{ 'green' if result.rc == 0 else 'blue' }}"

    - name: Show colors
      debug:
        msg: "Active={{ active_color }}, Inactive={{ inactive_color }}"

# 👉 Deploy + Health Check with rollback protection
- hosts: "{{ hostvars['loadbalancer'].inactive_color }}_nodes"
  vars:
    app_version: "{{ app_version }}"
    app_port: "{{ 5001 if hostvars['loadbalancer'].inactive_color == 'green' else 5000 }}"
  tasks:
    - block:

        - name: Install base dependencies
          include_role:
            name: common

        - name: Deploy application
          include_role:
            name: app

        - name: Run health checks
          include_role:
            name: health_check

      rescue:
        - name: Deployment failed - rollback triggered
          debug:
            msg: "Deployment failed! Keeping previous version active."

# 👉 Switch traffic ONLY if above succeeded
- hosts: loadbalancer
  vars:
    target_color: "{{ hostvars['loadbalancer'].inactive_color }}"
  roles:
    - load_balancer
